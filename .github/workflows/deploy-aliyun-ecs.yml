# Reusable: deploy the published ACR image on an Aliyun ECS instance over SSH.
# Prerequisites (GitHub): secret INFISICAL_OIDC_IDENTITY_ID; var INFISICAL_PROJECT_SLUG.
# Prerequisites (Infisical): ACR_REGISTRY, ACR_REPOSITORY, ACR_USERNAME, ACR_PASSWORD (for docker login on ECS),
# ECS_HOST, ECS_USER, ECS_SSH_PRIVATE_KEY (PEM; multiline ok when stored in Infisical),
# ECS_DEPLOY_PATH (absolute path on the host, e.g. /opt/openclaw).
# Optional: docker-compose interpolation vars (OPENCLAW_* , CLAUDE_* , etc.) for the generated .env.

name: Deploy to Aliyun ECS

on:
  workflow_call:
    inputs:
      image_tag:
        description: Image tag to pull on ECS (for example latest or a release version)
        type: string
        required: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment: prod
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch secrets from Infisical for Docker Release
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG || 'prod' }}
          export-type: file
          secret-path: /${{ github.event.repository.name }}

      - name: Fetch secrets from Infisical for ECS
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: oidc
          identity-id: ${{ secrets.INFISICAL_OIDC_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG || 'prod' }}
          export-type: env
          secret-path: /${{ github.event.repository.name }}/deploy

      - name: Resolve deploy image ref
        id: deploy
        shell: bash
        env:
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          ACR_REPOSITORY: ${{ env.ACR_REPOSITORY }}
          ECS_DEPLOY_PATH: ${{ env.ECS_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          if [[ -z "${ACR_REGISTRY:-}" || -z "${ACR_REPOSITORY:-}" ]]; then
            echo "::error::ACR_REGISTRY and ACR_REPOSITORY must be set (from Infisical)."
            exit 1
          fi
          if [[ -z "${ECS_DEPLOY_PATH:-}" ]]; then
            echo "::error::ECS_DEPLOY_PATH must be set (from Infisical)."
            exit 1
          fi
          if [[ -z "${ACR_USERNAME:-}" || -z "${ACR_PASSWORD:-}" ]]; then
            echo "::error::ACR_USERNAME and ACR_PASSWORD must be set (from Infisical) for docker login on ECS."
            exit 1
          fi
          {
            echo "image<<EOF"
            echo "${ACR_REGISTRY}/${ACR_REPOSITORY}:${{ inputs.image_tag }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure ECS deploy directory exists
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ env.ECS_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "${{ env.ECS_DEPLOY_PATH }}"

      - name: Upload docker-compose.yml and .env to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ env.ECS_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,.env"
          target: ${{ env.ECS_DEPLOY_PATH }}

      - name: Stop stack, pull image, compose up, prune
        uses: appleboy/ssh-action@v1.2.2
        env:
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          ACR_USERNAME: ${{ env.ACR_USERNAME }}
          ACR_PASSWORD: ${{ env.ACR_PASSWORD }}
        with:
          host: ${{ env.ECS_HOST }}
          username: ${{ env.ECS_USER }}
          key: ${{ env.ECS_SSH_PRIVATE_KEY }}
          envs: ACR_REGISTRY,ACR_USERNAME,ACR_PASSWORD
          script: |
            set -euo pipefail
            echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin
            cd "${{ env.ECS_DEPLOY_PATH }}"
            if docker compose version >/dev/null 2>&1; then
              docker compose down --remove-orphans || true
            else
              docker-compose down --remove-orphans || true
            fi
            docker pull "${{ steps.deploy.outputs.image }}"
            if docker compose version >/dev/null 2>&1; then
              docker compose --env-file .env up -d
            else
              docker-compose --env-file .env up -d
            fi
            docker system prune -f

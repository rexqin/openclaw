# Compose file format 3.8 — supports `docker compose` locally and `docker stack deploy` on Swarm.
# Overlay network `ibb8-net` must exist before deploy:
#   Swarm: docker network create --driver overlay --attachable ibb8-net
#   Local: docker network create ibb8-net
# Stack: docker stack deploy -c docker-compose.yml "${OPENCLAW_STACK_NAME:-openclaw}"

version: "3.8"

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    env_file:
      - .env

    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## scripts/docker/setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    networks:
      - ibb8-net
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - "node.id == ${DEPLOY_NODE_ID:asbkmw1re0dd5hljecwqokuvt}"
      restart_policy:
        condition: any
        delay: 5s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    networks:
      - ibb8-net
    deploy:
      mode: replicated
      replicas: 0
      placement:
        constraints:
          - "node.id == ${DEPLOY_NODE_ID:asbkmw1re0dd5hljecwqokuvt}"
      restart_policy:
        condition: any
        delay: 5s

networks:
  ibb8-net:
    external: true
